function initAirportSatMap(a){
  const el = document.getElementById('apSatMap');
  if(!el || !L) return;
  if(window._satMap){ try{window._satMap.remove()}catch(e){} }
  window._satMap = L.map(el, {
    zoomControl: true, attributionControl: false,
    scrollWheelZoom: false, doubleClickZoom: true, dragging: true,
    zoomSnap: 0.5,
  }).setView([a.lat, a.lng], 13);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 }).addTo(window._satMap);
  L.circleMarker([a.lat, a.lng], { radius: 9, color:'#fff', weight:2.5, opacity:1, fillColor:'#00e5ff', fillOpacity:0.95 }).addTo(window._satMap);
  // Force Leaflet to recompute container size after layout stabilises -- prevents
  // black bands when grid auto-stretches the side column taller than initial map.
  const inv = () => { try { window._satMap.invalidateSize(true); } catch(e){} };
  requestAnimationFrame(() => requestAnimationFrame(inv));
  setTimeout(inv, 200);
  setTimeout(inv, 600);
  // Also watch for any subsequent layout changes (e.g. when wiki image loads)
  if(window.ResizeObserver){
    const ro = new ResizeObserver(() => inv());
    ro.observe(el);
    window._satMap._ro = ro;
  }
}

async function loadAirportWiki(a){
  const section = document.getElementById('apWikiSection');
  if(!section) return;
  function normalize(name){
    if(!name) return '';
    return name.replace(/Int['‘’]?l/g, 'International').replace(/Airpoet/g, 'Airport').replace(/[‘’]/g, "'").trim();
  }
  let title = normalize(a.nameEn);
  let summary = null;
  if(title){
    summary = await fetchJson('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title.replace(/ /g,'_')));
  }
  if(!summary || summary.type === 'disambiguation' || !summary.extract){
    if(title){
      const search = await fetchJson('https://en.wikipedia.org/w/api.php?action=opensearch&format=json&origin=*&limit=1&search=' + encodeURIComponent(title));
      if(search && search[1] && search[1][0]){
        summary = await fetchJson('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(search[1][0].replace(/ /g,'_')));
      }
    }
  }
  if(!summary || !summary.extract){
    section.innerHTML = '<div class="ap-section-title">机场资料</div>' +
      '<div class="tab-empty" style="padding:14px">Wikipedia 上没找到对应条目<br>' +
      '<a href="https://en.wikipedia.org/w/index.php?search=' + encodeURIComponent(a.nameEn||a.iata) + '" target="_blank" style="color:var(--accent);font-size:11px">手动搜索 ↗</a></div>';
    return;
  }
  const thumb = summary.thumbnail ? '<img class="ap-wiki-img" src="' + summary.thumbnail.source + '" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' : '';
  section.innerHTML = '<div class="ap-section-title">机场资料 · <a href="' + summary.content_urls.desktop.page + '" target="_blank" style="color:var(--accent);text-decoration:none;font-size:10px;letter-spacing:0">Wikipedia ↗</a></div>' +
    thumb +
    '<div class="ap-wiki-text">' + summary.extract + '</div>' +
    '<div id="apWikidata"><div style="padding:8px 0;font-size:11px;color:var(--text-mute)">正在加载结构化数据...</div></div>';
  if(summary.wikibase_item){
    const wd = await fetchJson('https://www.wikidata.org/w/api.php?action=wbgetentities&format=json&origin=*&props=claims&ids=' + summary.wikibase_item);
    if(wd && wd.entities && wd.entities[summary.wikibase_item]){
      const claims = wd.entities[summary.wikibase_item].claims;
      const rows = extractWdRows(claims);
      const wdEl = document.getElementById('apWikidata');
      if(wdEl){
        wdEl.innerHTML = rows.length ? '<div class="ap-wd-grid">' + rows.map(r =>
          '<div class="ap-wd-row"><div class="ap-wd-key">' + r.label + '</div><div class="ap-wd-val">' + r.value + '</div></div>'
        ).join('') + '</div>' : '';
      }
    }
  }
}

async function fetchJson(url){
  try {
    const r = await fetch(url);
    if(!r.ok) return null;
    return await r.json();
  } catch(e){ console.warn('fetch', url, e); return null; }
}

function extractWdRows(claims){
  const rows = [];
  const yearOfTime = t => { const m = String(t).match(/[+-]?(\d{4})/); return m ? m[1] : null; };
  if(claims.P571){
    const t = claims.P571[0] && claims.P571[0].mainsnak && claims.P571[0].mainsnak.datavalue && claims.P571[0].mainsnak.datavalue.value && claims.P571[0].mainsnak.datavalue.value.time;
    const y = yearOfTime(t);
    if(y) rows.push({label:'投入运营', value: y + ' 年'});
  }
  if(claims.P3872){
    let best = null;
    for(const c of claims.P3872){
      const amt = c.mainsnak && c.mainsnak.datavalue && c.mainsnak.datavalue.value && c.mainsnak.datavalue.value.amount;
      const qual = c.qualifiers && c.qualifiers.P585 && c.qualifiers.P585[0] && c.qualifiers.P585[0].datavalue && c.qualifiers.P585[0].datavalue.value && c.qualifiers.P585[0].datavalue.value.time;
      if(amt){
        const n = parseFloat(amt.replace('+',''));
        const yr = qual ? yearOfTime(qual) : null;
        if(!best || (yr && (!best.yr || yr > best.yr)) || (!yr && !best.yr && n > best.n)){
          best = {n, yr};
        }
      }
    }
    if(best) rows.push({label:'年吞吐量', value: best.n.toLocaleString() + ' 人次' + (best.yr ? ' · ' + best.yr : '')});
  }
  if(claims.P1314){
    const v = claims.P1314[0] && claims.P1314[0].mainsnak && claims.P1314[0].mainsnak.datavalue && claims.P1314[0].mainsnak.datavalue.value;
    const amt = v && v.amount;
    if(amt) rows.push({label:'跑道数', value: parseFloat(amt.replace('+','')) + ' 条'});
  }
  if(claims.P2046){
    const v = claims.P2046[0] && claims.P2046[0].mainsnak && claims.P2046[0].mainsnak.datavalue && claims.P2046[0].mainsnak.datavalue.value;
    if(v && v.amount) rows.push({label:'占地面积', value: parseFloat(v.amount.replace('+','')).toLocaleString() + ' 公顷'});
  }
  if(claims.P2044){
    const v = claims.P2044[0] && claims.P2044[0].mainsnak && claims.P2044[0].mainsnak.datavalue && claims.P2044[0].mainsnak.datavalue.value;
    if(v && v.amount) rows.push({label:'海拔', value: Math.round(parseFloat(v.amount.replace('+',''))) + ' 米'});
  }
  return rows;
}

function renderStatsTab(){

  const totalSec = flights.reduce((s,f) => s + (f.sec||0), 0);
  const totalHr  = totalSec / 3600;
  const avgKm    = totalKm / flights.length;
  const avgSpeed = totalHr > 0 ? totalKm / totalHr : 0;

  const longest  = flights.reduce((m,f) => (f.km||0)>(m.km||0)?f:m, {km:0});
  const flightsWithKm = flights.filter(f => f.km && f.km > 0);
  // Ties broken by *later* date so the unique helicopter ride (Lukla → KTM)
  // beats the regular plane on the same pair.
  const shortest = flightsWithKm.length
    ? flightsWithKm.slice().sort((a,b) => (a.km - b.km) || (b.date||'').localeCompare(a.date||''))[0]
    : null;

  // Geography extremes
  let n=null, s=null, e=null, w=null;
  flights.forEach(f => {
    [f.depI, f.arrI, f.stopI].forEach(ic => {
      const a = A[ic]; if(!a || a.lat==null) return;
      if(!n || a.lat > n.lat) n = a;
      if(!s || a.lat < s.lat) s = a;
      if(!e || a.lng > e.lng) e = a;
      if(!w || a.lng < w.lng) w = a;
    });
  });

  // Year distribution
  const byYear = {};
  flights.forEach(f => { const y = yearOf(f); if(y) byYear[y] = (byYear[y]||0) + 1; });
  const yrs = Object.keys(byYear).map(Number).sort((a,b)=>a-b);
  const peakYr = Object.entries(byYear).sort((a,b)=>b[1]-a[1])[0];
  const maxYrCount = Math.max(1, ...Object.values(byYear));

  // First / latest flight
  const sorted = [...flights].filter(f => f.date).sort((a,b) => a.date.localeCompare(b.date));
  const firstF = sorted[0], lastF = sorted[sorted.length-1];

  // Most-visited airport

  const topAp = Object.entries(apUse).sort((a,b)=>b[1]-a[1])[0];

  // Most-flown airline
  const alUse = {};

  const topAl = Object.entries(alUse).sort((a,b)=>b[1]-a[1])[0];

  // Most-flown aircraft
  const acUse = {};
  flights.forEach(f => { if(f.icao) acUse[f.icao] = (acUse[f.icao]||0) + 1; });
  const topAcEntry = Object.entries(acUse).sort((a,b)=>b[1]-a[1])[0];

  // Time spans
  const earthCircles = (totalKm / 40075).toFixed(2);

      </div>
      <div class="big-stat-sub" style="margin-top:8px">${moonOutbound

function sortRows(rows, by, get){
  const cmp = {
    'count':  (a,b) => get(b).count - get(a).count || (get(a).name||'').localeCompare(get(b).name||'','zh'),
    'name':   (a,b) => (get(a).name||'').localeCompare(get(b).name||'','zh'),
    'nameEn': (a,b) => (get(a).nameEn||'').localeCompare(get(b).nameEn||''),
    'iata':   (a,b) => (get(a).iata||'').localeCompare(get(b).iata||''),
    'icao':   (a,b) => (get(a).icao||'').localeCompare(get(b).icao||''),
    'country':(a,b) => (get(a).country||'').localeCompare(get(b).country||'','zh') || (get(b).count - get(a).count),
    'fv':     (a,b) => (get(a).fv||'9999').localeCompare(get(b).fv||'9999'),
    'lat':    (a,b) => (get(b).lat||0) - (get(a).lat||0),
    'recent': (a,b) => (get(b).last||'').localeCompare(get(a).last||''),
  };
  return rows.sort(cmp[by] || cmp.count);
}

function renderAirlinesTab(){
  const flights = visibleFlights('airline');

  flights.forEach(f => {

    byAl[k].count++;
    if(f.date > byAl[k].last) byAl[k].last = f.date;
  });
  const aliata = Object.fromEntries(EMBEDDED.airlines.map(a => [a.nameCn, a]));
  Object.keys(byAl).forEach(k => {
    const meta = aliata[k];
    if(meta){ byAl[k].iata = meta.iata; byAl[k].icao = meta.icao; byAl[k].nameEn = meta.nameEn; }
  });
  const items = Object.values(byAl);

function aircraftMeta(name){
  return EMBEDDED.aircraft.find(a => a.name === name || a.icao_type === name) || null;

function haversineKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI / 180;
  const dLng = (lng2-lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Re-bind formDraft so inline oninput sees the same object
function attachAutocompletes(){
  window.formDraft = formDraft;
  // ----- Airlines -----
  const airlineList = [...new Set([...EMBEDDED.airlines.map(a=>a.nameCn), ...F.map(f=>f.al)])].filter(Boolean).sort((a,b)=>a.localeCompare(b,'zh'));
  setupAc('f_al', 'd_al', q => {
    const results = airlineList.filter(a => a.toLowerCase().includes(q.toLowerCase())).slice(0,30);
    return results.map(a => {
      const meta = airlineMeta(a);
      return {value:a, sub: meta ? meta.iata + ' · ' + (meta.nameEn||'') : ''};
    });
  }, val => {
    formDraft.al = val;
    if(!formDraft.op) { formDraft.op = val; document.getElementById('f_op').value = val; }
  });
  setupAc('f_op', 'd_op', q => {
    const results = airlineList.filter(a => a.toLowerCase().includes(q.toLowerCase())).slice(0,30);
    return results.map(a => ({value:a, sub:''}));
  }, val => { formDraft.op = val; });

  // ----- Airports -----
  const allAirports = Object.values(A).map(a => ({
    short: (a.nameCn||'').replace(/(国际)?机场$/,''),
    icao: a.icao, iata: a.iata, ctry: a.ctryCn, lat: a.lat, lng: a.lng, full: a.nameCn,
  })).filter(x => x.short).sort((a,b)=>a.short.localeCompare(b.short,'zh'));

  function airportLookup(q){
    if(!q) return allAirports.slice(0,30).map(a => ({value:a.short, sub:a.iata+' · '+a.ctry, _ap:a}));
    const ql = q.toLowerCase();
    const results = allAirports.filter(a =>
      a.short.toLowerCase().includes(ql) ||
      (a.iata||'').toLowerCase().includes(ql) ||
      (a.icao||'').toLowerCase().includes(ql)
    ).slice(0,30);
    return results.map(a => ({value:a.short, sub:a.iata+' · '+a.ctry, _ap:a}));
  }

  ['f_dep','f_arr','f_stop'].forEach(id => {
    const which = id.replace('f_','');  // dep / arr / stop
    setupAc(id, 'd_'+which, airportLookup, (val, opt) => {
      formDraft[which] = val;
      if(opt && opt._ap){
        formDraft[which + 'I'] = opt._ap.icao;
        showHint('h_'+which, opt._ap.full + ' (' + opt._ap.iata + ' / ' + opt._ap.icao + ')');
      } else {
        // unknown airport -- need extra info
        formDraft[which + 'I'] = '';
        showHint('h_'+which, '未知机场,需在下方补充信息', 'warn');
      }
      maybeAutoCalcKm();
      renderNewAirportPanel();
    }, val => {
      // also fired when user types freely. If exact short match found, auto-pick.
      const ap = allAirports.find(a => a.short === val);
      if(ap){
        formDraft[which + 'I'] = ap.icao;
        showHint('h_'+which, ap.full + ' (' + ap.iata + ' / ' + ap.icao + ')');
      } else if(val){
        formDraft[which + 'I'] = '';
        showHint('h_'+which, '未知机场,需在下方补充信息', 'warn');
      } else {
        showHint('h_'+which, '');
      }
      maybeAutoCalcKm();
      renderNewAirportPanel();
    });
  });

  // ----- Aircraft -----
  const aircraftList = EMBEDDED.aircraft.map(a => ({name:a.name, icao:a.icao_type}));
  setupAc('f_ac', 'd_ac', q => {
    const ql = q.toLowerCase();
    const results = aircraftList.filter(a =>
      a.name.toLowerCase().includes(ql) || a.icao.toLowerCase().includes(ql)
    ).slice(0,30);
    return results.map(a => ({value:a.name, sub:a.icao, _ac:a}));
  }, (val, opt) => {
    formDraft.ac = val;
    if(opt && opt._ac){
      formDraft.icao = opt._ac.icao;
      document.getElementById('f_icao').value = opt._ac.icao;
    }
  }, val => { formDraft.ac = val; });
}

function showHint(id, msg, cls){
  const el = document.getElementById(id);
  if(!el) return;
  el.className = 'form-hint' + (cls?' '+cls:'');
  el.textContent = msg || '';
}

function maybeAutoCalcKm(){
  const dep = A[formDraft.depI];
  const arr = A[formDraft.arrI];
  const stop = formDraft.stopI ? A[formDraft.stopI] : null;
  const kmInput = document.getElementById('f_km');
  if(!kmInput) return;
  if(!dep || !arr) { showHint('h_km',''); return; }
  let km;
  if(stop) km = haversineKm(dep.lat, dep.lng, stop.lat, stop.lng) + haversineKm(stop.lat, stop.lng, arr.lat, arr.lng);
  else km = haversineKm(dep.lat, dep.lng, arr.lat, arr.lng);
  km = Math.round(km);
  if(!kmInput.value || kmInput.value === String(formDraft._lastAutoKm||'')){
    kmInput.value = km;
    formDraft.km = String(km);
  }
  formDraft._lastAutoKm = km;
  showHint('h_km', '大圆距离 ≈ ' + km + ' km');
}

// Generic autocomplete dropdown
function setupAc(inputId, dropId, lookupFn, onSelect, onType){
  const inp = document.getElementById(inputId);
  const drop = document.getElementById(dropId);
  if(!inp || !drop) return;
  let highlighted = -1, currentOptions = [];
  function showResults(){
    const opts = lookupFn(inp.value);
    currentOptions = opts;
    if(!opts.length){ drop.classList.remove('on'); return; }
    drop.innerHTML = opts.map((o,i) =>
      '<div class="ac-opt" data-i="' + i + '">' + o.value +
      (o.sub ? ' <span class="ac-sub">' + o.sub + '</span>' : '') +
      '</div>'
    ).join('');
    drop.classList.add('on');
    highlighted = -1;
    drop.querySelectorAll('.ac-opt').forEach(el => {
      el.addEventListener('mousedown', e => { e.preventDefault(); selectOption(parseInt(el.dataset.i)); });
    });
  }
  function selectOption(i){
    const opt = currentOptions[i];
    if(!opt) return;
    inp.value = opt.value;
    drop.classList.remove('on');
    if(onSelect) onSelect(opt.value, opt);
  }
  inp.addEventListener('focus', showResults);
  inp.addEventListener('input', e => {
    showResults();
    if(onType) onType(inp.value);
  });
  inp.addEventListener('blur', () => setTimeout(() => drop.classList.remove('on'), 200));
  inp.addEventListener('keydown', e => {
    if(e.key === 'ArrowDown'){ e.preventDefault(); highlighted = Math.min(highlighted+1, currentOptions.length-1); updateHl(); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); highlighted = Math.max(highlighted-1, 0); updateHl(); }
    else if(e.key === 'Enter'){ if(highlighted >= 0){ e.preventDefault(); selectOption(highlighted); } }
    else if(e.key === 'Escape'){ drop.classList.remove('on'); }
  });
  function updateHl(){
    drop.querySelectorAll('.ac-opt').forEach((el,i) => el.classList.toggle('hl', i === highlighted));
    const hl = drop.querySelector('.ac-opt.hl');
    if(hl) hl.scrollIntoView({block:'nearest'});
  }
}

function submitForm(){
  const errs = [];
  if(!formDraft.flight_no) errs.push('航班号');
  if(!formDraft.date) errs.push('日期');
  if(!formDraft.al) errs.push('营销航司');
  if(!formDraft.dep) errs.push('出发');
  if(!formDraft.arr) errs.push('到达');
  if(!formDraft.ac) errs.push('机型');
  if(!formDraft.icao) errs.push('ICAO 代码');
  if(errs.length){ toast('请填写:' + errs.join(' / '), 'err'); return; }

  // Resolve airports -- create new ones if needed
  function resolveAirport(which){
    const val = formDraft[which];
    let ic = formDraft[which + 'I'];
    if(ic) return ic;
    if(!val) return null;
    // Check new-airport panel
    const na = formDraft.newAirports[val];
    if(!na) return null;
    if(!na.iata || !na.icao || !na.lat || !na.lng){
      throw new Error('新机场 ' + val + ' 缺少 IATA / ICAO / 经纬度');
    }
    // Save new airport to A
    const newA = {
      iata: na.iata, icao: na.icao,
      nameEn: na.nameEn || '',
      nameCn: na.nameCn || (val + '机场'),
      ctry: na.ctry || '',
      ctryCn: na.ctryCn || '',
      fv: formDraft.date,
      d:0, a:0, s:0,
      lat: parseFloat(na.lat), lng: parseFloat(na.lng),
      _u: true,
    };
    A[na.icao] = newA;
    return na.icao;
  }

  let depI, arrI, stopI = null;
  try {
    depI = resolveAirport('dep');
    arrI = resolveAirport('arr');
    if(formDraft.stop) stopI = resolveAirport('stop');
  } catch(e){ toast(e.message, 'err'); return; }

  if(!depI || !arrI){ toast('出发或到达机场未识别', 'err'); return; }

  const sec = (parseInt(formDraft.hh)||0)*3600 + (parseInt(formDraft.mm)||0)*60;
  const newFlight = {
    id: nextId++,
    no: formDraft.flight_no,
    al: formDraft.al,
    op: formDraft.op || formDraft.al,
    date: formDraft.date,
    dep: formDraft.dep, arr: formDraft.arr, stop: formDraft.stop || null,
    depI, arrI, stopI,
    ac: formDraft.ac, icao: formDraft.icao,
    reg: formDraft.reg || null,
    regC: formDraft.regC || null,
    km: formDraft.km ? Math.round(parseFloat(formDraft.km)) : null,
    sec: sec || null,
    depT: formDraft.depT || null,
    arrT: formDraft.arrT || null,
    _u: true,
  };
  F.push(newFlight);
  saveLocal();
  closeForm();
  update();
  toast('已保存 ' + newFlight.no + ' · 看板已更新');
}
window.submitForm = submitForm;

function exportJson(){
  const userFlights = F.filter(f => f._u);
  const userAirports = Object.values(A).filter(a => a._u);
  const blob = new Blob([JSON.stringify({flights:userFlights, airports:userAirports}, null, 2)],
                       {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'flight_atlas_local_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('已下载 ' + userFlights.length + ' 条本地飞行');
}

function importJson(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const j = JSON.parse(e.target.result);
      if(!Array.isArray(j.flights)) throw new Error('格式错误');
      // Add airports first
      (j.airports||[]).forEach(a => { if(!A[a.icao]) A[a.icao] = {...a, _u:true}; });
      // Append flights, re-id to avoid clash
      j.flights.forEach(f => {
        F.push({...f, id: nextId++, _u:true});
      });
      saveLocal();
      update();
      toast('已导入 ' + j.flights.length + ' 条飞行');
    } catch(err){ toast('导入失败:' + err.message, 'err'); }
    ev.target.value = '';
  };
  reader.readAsText(file);
}
window.importJson = importJson;

function clearLocal(){
  // Remove user flights & airports
  for(let i = F.length - 1; i >= 0; i--){
    if(F[i]._u) F.splice(i, 1);
  }
  Object.keys(A).forEach(k => { if(A[k]._u) delete A[k]; });
  saveLocal();
  update();
  toast('已清除本地新增');
}
window.clearLocal = clearLocal;

let searchResults = [], searchSel = -1;

function doSearch(q){
  const pop = $('searchPop');
  q = (q||'').trim().toLowerCase();
  searchResults = []; searchSel = -1;
  if(!q){ pop.classList.remove('on'); return; }
  const hit = s => s && String(s).toLowerCase().includes(q);

  const aps = Object.values(A).filter(a => hit(a.iata)||hit(a.icao)||hit(a.nameCn)||hit(a.nameEn)).slice(0,4);
  const regs = [...new Set(F.map(f=>f.reg).filter(Boolean))].filter(r => r.toLowerCase().includes(q)).slice(0,3);
  const flts = F.filter(f => hit(f.no)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);
  const als = [...new Set(F.map(opOf).filter(Boolean))].filter(hit).slice(0,3);
  const acs = [...new Map(F.filter(f=>f.icao).map(f=>[f.icao,f.ac||f.icao])).entries()]
    .filter(([ic,name]) => hit(ic)||hit(name)).slice(0,3);

  let html = '';
  if(aps.length){
    html += '<div class="search-cat">机场</div>' + aps.map((a,i) => {
      searchResults.push({act: () => { openAirport(a.icao); }});
      return `<div class="search-item" data-i="${searchResults.length-1}"><span class="si-ico">🛫</span><span class="si-main">${a.nameCn} <span style="color:var(--ink-mute)">${a.nameEn||''}</span></span><span class="si-sub">${a.iata||a.icao}</span></div>`;
    }).join('');
  }
  if(regs.length){
    html += '<div class="search-cat">注册号</div>' + regs.map(r => {
      const cnt = F.filter(f=>f.reg===r).length;
      searchResults.push({act: () => { openReg(r); }});
      return `<div class="search-item" data-i="${searchResults.length-1}"><span class="si-ico">🛩️</span><span class="si-main" style="font-family:monospace">${r}</span><span class="si-sub">${cnt} 次</span></div>`;
    }).join('');
  }
  if(flts.length){
    html += '<div class="search-cat">航班</div>' + flts.map(f => {
      searchResults.push({act: () => { openFlight(f.id); }});
      return `<div class="search-item" data-i="${searchResults.length-1}"><span class="si-ico">✈️</span><span class="si-main"><b style="color:var(--accent-2)">${f.no}</b> ${f.dep} → ${f.arr}</span><span class="si-sub">${f.date||''}</span></div>`;
    }).join('');
  }
  if(als.length){
    html += '<div class="search-cat">航司 · 点击筛选</div>' + als.map(al => {
      const cnt = F.filter(f=>opOf(f)===al).length;
      searchResults.push({act: () => { state.airlines = new Set([al]); update(); toast('已筛选:' + al); }});
      return `<div class="search-item" data-i="${searchResults.length-1}"><span class="si-ico">🏢</span><span class="si-main">${al}</span><span class="si-sub">${cnt} 次</span></div>`;
    }).join('');
  }
  if(acs.length){
    html += '<div class="search-cat">机型 · 点击筛选</div>' + acs.map(([ic,name]) => {
      const cnt = F.filter(f=>f.icao===ic).length;
      searchResults.push({act: () => { state.aircraft = new Set([ic]); update(); toast('已筛选:' + name); }});
      return `<div class="search-item" data-i="${searchResults.length-1}"><span class="si-ico">🛩️</span><span class="si-main">${name}</span><span class="si-sub">${ic} · ${cnt} 次</span></div>`;
    }).join('');
  }
  pop.innerHTML = html || '<div class="search-empty">没有匹配的结果</div>';
  pop.classList.add('on');
  pop.querySelectorAll('.search-item').forEach(el => {
    el.addEventListener('click', () => { runSearchResult(parseInt(el.dataset.i)); });
  });
}
function runSearchResult(i){
  const r = searchResults[i];
  if(!r) return;
  $('searchPop').classList.remove('on');
  $('searchWrap').classList.remove('mobile-open');
  $('searchInput').blur();
  r.act();
}
function searchKey(e){
  const pop = $('searchPop');
  const items = pop.querySelectorAll('.search-item');
  if(e.key === 'Escape'){ pop.classList.remove('on'); e.target.blur(); return; }
  if(e.key === 'ArrowDown' || e.key === 'ArrowUp'){
    e.preventDefault();
    if(!items.length) return;
    searchSel = e.key === 'ArrowDown' ? (searchSel+1) % items.length : (searchSel-1+items.length) % items.length;
    items.forEach((el,i) => el.classList.toggle('sel', i===searchSel));
    items[searchSel].scrollIntoView({block:'nearest'});
    return;
  }
  if(e.key === 'Enter'){
    const i = searchSel >= 0 ? searchSel : 0;
    if(items[i]) runSearchResult(parseInt(items[i].dataset.i));
  }
}
document.addEventListener('click', e => {
  if(!e.target.closest('#searchWrap') && !e.target.closest('#searchToggle')){
    $('searchPop').classList.remove('on');
    $('searchWrap').classList.remove('mobile-open');
  }
  if(!e.target.closest('.ach-card') && !e.target.closest('#achTip')) hideAchTip();
});
$('searchToggle').addEventListener('click', e => {
  e.stopPropagation();
  const w = $('searchWrap');
  const open = w.classList.toggle('mobile-open');
  if(open) $('searchInput').focus();
  else $('searchPop').classList.remove('on');
});
document.addEventListener('keydown', e => {
  if(e.key === '/' && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)){
    e.preventDefault(); const si = $('searchInput'); if(si) si.focus();
  }
});
window.doSearch = doSearch; window.searchKey = searchKey; window.runSearchResult = runSearchResult;

function fleetData(){
  const byReg = {};
  visibleFlights().forEach(f => {
    if(!f.reg) return;
    if(!byReg[f.reg]) byReg[f.reg] = {reg:f.reg, flights:[], ac:null, icao:null, al:null};
    const r = byReg[f.reg];
    r.flights.push(f);
    if(f.ac) r.ac = f.ac;
    if(f.icao) r.icao = f.icao;
    if(opOf(f)) r.al = opOf(f);
  });
  return Object.values(byReg);
}
function renderFleetTab(){
  const fleet = fleetData();
  if(!fleet.length) return '<div class="tab-empty">没有含注册号的航班</div>';
  const withPhoto = fleet.filter(r => PHOTO_MANIFEST[r.reg]).length;
  const groups = {'Airbus':[], 'Boeing':[], '其他':[]};
  fleet.forEach(r => {
    const ic = r.icao || '';
    if(/^A[23]/.test(ic)) groups['Airbus'].push(r);
    else if(/^B7/.test(ic)) groups['Boeing'].push(r);
    else groups['其他'].push(r);
  });
  Object.values(groups).forEach(g => g.sort((a,b) => b.flights.length - a.flights.length || a.reg.localeCompare(b.reg)));
  let html = `
    <div class="fleet-head">
      <div class="fleet-title">✈️ 同乘过的每一架飞机</div>
      <div class="fleet-sub">${fleet.length} 架 · ${withPhoto} 张照片</div>
    </div>`;
  for(const [name, list] of Object.entries(groups)){
    if(!list.length) continue;
    html += `<div class="fleet-group-lbl">${name} · ${list.length} 架</div><div class="fleet-grid">`;
    html += list.map(r => {
      const meta = PHOTO_MANIFEST[r.reg];
      const img = meta && meta.file
        ? `<img class="fleet-img" loading="lazy" src="./photos/${meta.file}" alt="${r.reg}" onerror="this.outerHTML='<div class=\\'fleet-noimg\\'>✈️</div>'">`
        : `<div class="fleet-noimg">✈️</div>`;
      return `<div class="fleet-card" onclick="openReg('${attrEsc(r.reg)}')">
        ${img}
        <div class="fleet-count">×${r.flights.length}</div>
        <div class="fleet-meta">
          <div class="fleet-reg">${r.reg}</div>
          <div class="fleet-type">${r.ac || r.icao || ''}</div>
        </div>
      </div>`;
    }).join('');
    html += '</div>';
  }
  return html;
}

  '奥斯陆':['ENGM','ENTO'], '莫斯科':['UUEE','UUDD','UUWW'], '台北':['RCTP','RCSS'],
};
function computeAchievements(){
  const fl = F.filter(f => f.date).slice().sort((a,b) => ((a.date+(a.depT||'')).localeCompare(b.date+(b.depT||''))));
  if(!fl.length) return [];
  const MOON = 384400;
  const strip = ic => A[ic] ? A[ic].nameCn.replace(/(国际)?机场$/,'') : ic;
  const fRow = f => `<div class="tip-row"><span class="tip-date">${f.date}</span><span><b>${f.no||''}</b> ${f.dep} → ${f.arr}</span></div>`;
  const rows = arr => arr.map(fRow).join('');
  const kRow = (date, html) => `<div class="tip-row"><span class="tip-date">${date||''}</span><span>${html}</span></div>`;

  // ---- cumulative walks ----
  let cum = 0, moonDate = null, tenCircDate = null;
  fl.forEach(f => { cum += f.km||0; if(!moonDate && cum >= MOON) moonDate = f.date; if(!tenCircDate && cum >= 400750) tenCircDate = f.date; });
  const totalKm = cum;

  // ordered first-occurrence growth of a keyed set
  const growth = keyFn => { const s = new Set(), out = []; for(const f of fl){ for(const k of (keyFn(f)||[])){ if(k && !s.has(k)){ s.add(k); out.push({key:k, date:f.date, f}); } } } return out; };
  const apG = growth(f => [f.depI, f.arrI, f.stopI]);
  const alG = growth(f => [opOf(f)]);
  const acG = growth(f => [f.icao]);
  const ctG = growth(f => [f.depI, f.arrI, f.stopI].map(ic => A[ic] && A[ic].ctry));
  const contG = growth(f => [f.depI, f.arrI, f.stopI].map(ic => { const a = A[ic]; return a && CONTINENT[a.ctry]; }));
  const wideTypes = ['A332','A333','A339','A342','A343','A346','A359','A35K','A388','B762','B763','B764','B772','B773','B77L','B77W','B788','B789','B78X','B741','B742','B743','B744','B748'];
  const wideG = growth(f => wideTypes.includes(f.icao) ? [f.icao] : []);
  const propTypes = ['AT75','AT76','AT72','DH8D','DHC6','DH8A','DH8B','DH8C','SF34','ATP'];

  // ---- qualifying flight lists ----
  const arctic = fl.filter(f => [f.depI,f.arrI,f.stopI].some(ic => { const a = A[ic]; return a && a.lat > 66.55; }));
  const a380 = fl.filter(f => f.icao === 'A388');
  const b747 = fl.filter(f => ['B741','B742','B743','B744','B748'].includes(f.icao) || /747/.test(f.ac||''));
  const heli = fl.filter(f => ['AS35','AS50','EC30','EC35','B06','R44','H125'].includes(f.icao));
  const props = fl.filter(f => propTypes.includes(f.icao));
  const redeye = fl.filter(f => f.depT && f.depT >= '00:00' && f.depT < '05:30');
  const dateline = fl.filter(f => { const d = A[f.depI], a = A[f.arrI]; return d && a && Math.abs(d.lng - a.lng) > 180; });
  const ultraLong = fl.filter(f => (f.km||0) >= 10000).sort((a,b) => b.km - a.km);
  const equator = fl.filter(f => { const d = A[f.depI], a = A[f.arrI]; return d && a && d.lat * a.lat < 0; });
  const newyear = fl.filter(f => { const md = f.date.slice(5); return md === '12-31' || md === '01-01'; });
  const tzSpan = f => { const d = A[f.depI], a = A[f.arrI]; return d && a ? Math.abs(d.lng - a.lng) / 15 : 0; };
  const bigTz = fl.filter(f => tzSpan(f) >= 12).sort((a,b) => tzSpan(b) - tzSpan(a));

  // days & streaks
  const byDate = {}; fl.forEach(f => (byDate[f.date] = byDate[f.date] || []).push(f));
  const dayList = Object.keys(byDate).sort();
  const tripleDay = Object.entries(byDate).filter(([,v]) => v.length >= 3).sort((a,b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
  let streakBest = 1, streakCur = 1, streakEnd = dayList[0], streakDate3 = null;
  for(let i = 1; i < dayList.length; i++){
    const gap = (new Date(dayList[i]) - new Date(dayList[i-1])) / 864e5;
    streakCur = gap === 1 ? streakCur + 1 : 1;
    if(streakCur >= 3 && !streakDate3) streakDate3 = dayList[i];
    if(streakCur > streakBest){ streakBest = streakCur; streakEnd = dayList[i]; }
  }
  // longest gap (comeback)
  let gapBest = 0, gapFrom = null, gapTo = null;
  for(let i = 1; i < dayList.length; i++){
    const g = (new Date(dayList[i]) - new Date(dayList[i-1])) / 864e5;
    if(g > gapBest){ gapBest = g; gapFrom = dayList[i-1]; gapTo = dayList[i]; }
  }
  // busiest year & 40-per-year date
  const byYr = {}; fl.forEach(f => (byYr[f.date.slice(0,4)] = byYr[f.date.slice(0,4)] || []).push(f));
  let year40 = null, year40Date = null;
  Object.entries(byYr).sort().forEach(([y, arr]) => { if(!year40 && arr.length >= 40){ year40 = y; year40Date = arr[39].date; } });
  const topYear = Object.entries(byYr).sort((a,b) => b[1].length - a[1].length)[0];

  // reg reunions
  const regSeen = {}, reunions = [];
  fl.forEach(f => { if(!f.reg) return; (regSeen[f.reg] = regSeen[f.reg] || []).push(f); });
  Object.entries(regSeen).forEach(([r, arr]) => { if(arr.length > 1) reunions.push({reg:r, flights:arr}); });
  reunions.sort((a,b) => b.flights.length - a.flights.length || a.flights[1].date.localeCompare(b.flights[1].date));
  const reunionDate = reunions.length ? reunions.map(r => r.flights[1].date).sort()[0] : null;

  // frequent flyer
  const alCnt = {}; fl.forEach(f => { const k = opOf(f); if(k) alCnt[k] = (alCnt[k]||0) + 1; });
  const alTop = Object.entries(alCnt).sort((a,b) => b[1] - a[1]);
  let ff20Date = null;
  if(alTop.length && alTop[0][1] >= 20){
    const cnt = {};
    for(const f of fl){ const k = opOf(f); if(!k) continue; cnt[k] = (cnt[k]||0) + 1; if(cnt[k] === 20){ ff20Date = f.date; break; } }
  }

  // alliances
  const allianceHit = {}, allianceDate = {};
  for(const f of fl){
    const al = opOf(f); if(!al) continue;
    for(const [name, members] of Object.entries(ALLIANCES)){
      if(members.includes(al) && !allianceDate[name]){ allianceDate[name] = f.date; (allianceHit[name] = allianceHit[name] || new Set()); }
      if(members.includes(al)) (allianceHit[name] = allianceHit[name] || new Set()).add(al);
    }
  }
  const allianceDone = Object.keys(ALLIANCES).every(n => allianceDate[n]);
  const allianceEarnedDate = allianceDone ? Object.values(allianceDate).sort().pop() : null;

  // multi-airport cities
  const apFirst = {}; apG.forEach(g => { if(!apFirst[g.key]) apFirst[g.key] = g.date; });
  const cityDone = [];
  Object.entries(CITY_GROUPS).forEach(([city, ics]) => {
    const visited = ics.filter(ic => apFirst[ic]).sort((a,b) => apFirst[a].localeCompare(apFirst[b]));
    if(visited.length >= 2) cityDone.push({city, date: apFirst[visited[1]], aps: visited});
  });
  cityDone.sort((a,b) => a.date.localeCompare(b.date));

  const first = fl[0], last = fl[fl.length-1];
  const spanYears = (new Date(last.date) - new Date(first.date)) / 3.15576e10;
  const tenYearDate = spanYears >= 10 ? new Date(new Date(first.date).getTime() + 10 * 3.15576e10).toISOString().slice(0,10) : null;
  const nthDate = (g, n) => g.length >= n ? g[n-1].date : null;
  const latestRows = g => g.slice().reverse().map((x,i) => kRow(x.date, `<span class="tip-idx">#${g.length-i}</span> <b>${x.key}</b>`)).join('');
  const latestApRows = g => g.slice().reverse().map((x,i) => kRow(x.date, `<span class="tip-idx">#${g.length-i}</span> <b>${strip(x.key)}</b>`)).join('');

  const mk = (icon, name, desc, earned, detail, prog, date, tip) => ({icon, name, desc, earned, detail, prog, date, tip});
  return [
    mk('🛫','启程','完成人生第一次飞行', true, `${first.dep} → ${first.arr}`, 1, first.date,
       `<div class="tip-note">一切从这里开始:</div>${fRow(first)}`),
    mk('💯','百飞俱乐部','累计 100 次飞行', fl.length >= 100, `${fl.length} / 100 次`, fl.length/100, fl.length >= 100 ? fl[99].date : null,
       fl.length >= 100 ? `<div class="tip-note">第 100 班:</div>${fRow(fl[99])}<div class="tip-note" style="margin-top:6px">如今已累计 ${fl.length} 班。</div>` : `<div class="tip-note">已飞 ${fl.length} 班,还差 ${100-fl.length} 班。</div>`),
    mk('🎯','双百征程','累计 200 次飞行', fl.length >= 200, `${fl.length} / 200 次`, fl.length/200, fl.length >= 200 ? fl[199].date : null,
       fl.length >= 200 ? `<div class="tip-note">第 200 班:</div>${fRow(fl[199])}` : `<div class="tip-note">已飞 ${fl.length} 班,还差 ${200-fl.length} 班就到 200 大关。</div>`),
    mk('🌕','登月之旅','累计里程达到地月距离 384,400 km', totalKm >= MOON, `${fmt(Math.round(totalKm))} km`, totalKm/MOON, moonDate,
       moonDate ? `<div class="tip-note">在这一班上,你的累计里程越过了 384,400 km 的地月距离:</div>${rows(fl.filter(f=>f.date>=moonDate).slice(0,1))}<div class="tip-note" style="margin-top:6px">现在已飞出 ${fmt(Math.round(totalKm))} km,正在"返程"途中。</div>` : `<div class="tip-note">还差 ${fmt(Math.round(MOON-totalKm))} km。</div>`),
    mk('🌍','十圈地球','累计里程绕赤道 10 圈 (400,750 km)', totalKm >= 400750, `已绕 ${(totalKm/40075).toFixed(2)} 圈`, totalKm/400750, tenCircDate,
       tenCircDate ? `<div class="tip-note">${tenCircDate} 完成第 10 圈。</div>` : `<div class="tip-note">已绕 ${(totalKm/40075).toFixed(2)} 圈,还差 ${fmt(Math.round(400750-totalKm))} km 凑满 10 圈。</div>`),
    mk('⏳','十年航迹','飞行记录跨越 10 年', spanYears >= 10, `${first.date.slice(0,4)} – ${last.date.slice(0,4)} · ${spanYears.toFixed(1)} 年`, spanYears/10, tenYearDate,
       `<div class="tip-note">从 ${first.date} 的第一班算起${spanYears>=10 ? `,${tenYearDate} 满十周年` : ''},至今 ${spanYears.toFixed(1)} 年。</div>${fRow(first)}${fRow(last)}`),
    mk('🕊️','王者归来','停飞一年以上后重返蓝天', gapBest >= 365, gapBest >= 365 ? `中断 ${Math.round(gapBest)} 天` : `最长间隔 ${Math.round(gapBest)} 天`, Math.min(1, gapBest/365), gapBest >= 365 ? gapTo : null,
       gapBest >= 365 ? `<div class="tip-note">${gapFrom} 之后整整 ${Math.round(gapBest)} 天没有飞行,直到——</div>${rows(byDate[gapTo])}` : ''),
    mk('🐝','年度劳模','单个自然年飞满 40 班', !!year40, year40 ? `${year40} 年 ${byYr[year40].length} 班` : `单年最多 ${topYear ? topYear[1].length : 0} 班`, topYear ? topYear[1].length/40 : 0, year40Date,
       year40 ? `<div class="tip-note">${year40} 年的第 40 班:</div>${rows(byYr[year40].slice(39,40))}<div class="tip-note" style="margin-top:6px">${year40} 全年共 ${byYr[year40].length} 班。</div>` : ''),
    mk('📅','一日三飞','同一天内飞行 3 段以上', tripleDay.length > 0, tripleDay.length ? `${tripleDay.length} 天做到过` : '', tripleDay.length ? 1 : (Math.max(0,...Object.values(byDate).map(v=>v.length)))/3, tripleDay.length ? tripleDay.map(t=>t[0]).sort()[0] : null,

  grid.querySelectorAll('.ach-card').forEach(el => {
    el.addEventListener('mouseenter', () => { cancelHideAchTip(); showAchTip(el); });
    el.addEventListener('mouseleave', scheduleHideAchTip);
    // 触屏:点按切换浮窗(mouseenter 与 click 同时触发时避免闪现即隐)
    el.addEventListener('click', () => {
      const t = $('achTip');
      const visibleForMe = t && t.style.display === 'block' && window._achTipFor === el;
      if(visibleForMe && Date.now() - (window._achTipShownAt || 0) > 500) hideAchTip();
      else { cancelHideAchTip(); showAchTip(el); }

  if(body) body.addEventListener('scroll', hideAchTip, {passive:true});
}
let _achHideTimer = null;
function scheduleHideAchTip(){ clearTimeout(_achHideTimer); _achHideTimer = setTimeout(hideAchTip, 200); }
function cancelHideAchTip(){ clearTimeout(_achHideTimer); }
function achTipEl(){
  let t = $('achTip');
  if(!t){
    t = document.createElement('div'); t.id = 'achTip'; document.body.appendChild(t);
    t.addEventListener('mouseenter', cancelHideAchTip);
    t.addEventListener('mouseleave', scheduleHideAchTip);
  }
  return t;
}
function showAchTip(card){
  const a = window._ACH && window._ACH[parseInt(card.dataset.ach)];
  if(!a || !a.tip) return;
  const t = achTipEl();
  window._achTipFor = card;
  window._achTipShownAt = Date.now();
  t.classList.toggle('sheet', window.matchMedia('(max-width:768px)').matches);
  t.innerHTML = `<div class="tip-title">${a.icon} ${a.name}${a.earned && a.date ? `<span style="margin-left:auto;font-size:10px;color:var(--ink-mute);font-weight:500">${a.date}</span>` : ''}</div>${a.tip}`;
  t.style.display = 'block';
  t.style.visibility = 'hidden';
  t.scrollTop = 0;
  const r = card.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const tw = t.offsetWidth, th = t.offsetHeight;
  // 优先放在卡片右侧,放不下就放左侧,再不行居中盖上方/下方
  let left = r.right + 12;
  if(left + tw > vw - 10) left = r.left - tw - 12;
  if(left < 10) left = Math.max(10, Math.min(vw - tw - 10, r.left + r.width/2 - tw/2));
  let top = Math.max(10, Math.min(vh - th - 10, r.top + r.height/2 - th/2));
  t.style.left = left + 'px';
  t.style.top = top + 'px';
  t.style.visibility = 'visible';
}
function hideAchTip(){
  const t = $('achTip');
  if(t) t.style.display = 'none';
  window._achTipFor = null;
}
window.openAchievements = openAchievements;

  };
  const seen = key => new Set(before.flatMap(key));

  const oldAp = seen(apKey), oldAl = seen(f=>[opOf(f)].filter(Boolean)), oldAc = seen(f=>[f.icao].filter(Boolean)), oldCt = new Set([...oldAp].map(ic=>A[ic]&&A[ic].ctry).filter(Boolean));

        </div>` : ''}
      </div>
      <button class="head-btn" style="width:100%;justify-content:center;margin-top:14px" onclick="state.yearSet=new Set([${y}]);update();closeModal();toast('地图已切换到 ${y} 年')">在地图上查看 ${y} 年的航迹</button>
      ` : '<div class="search-empty" style="padding:40px">这一年没有飞行记录</div>'}
    </div>`;
  $('modalBg').classList.add('on');
}
window.openWrapped = openWrapped;

// ============================================================
// REPLAY (时光机) -- chronological animated playback
// ============================================================
let RP = null;

function rpDur(f){
  const base = 450 + (f.km || 500) / 6;
  return Math.max(550, Math.min(3200, base)) / (RP ? RP.speed : 1);
}
function rpPathFor(f){
  const d = A[f.depI], a = A[f.arrI];
  let pts, stopIdx = -1;
  if(f.stopI && A[f.stopI]){
    const s = A[f.stopI];
    const leg1 = gcPath(d.lat, d.lng, s.lat, s.lng);
    stopIdx = leg1.length - 1;
    pts = leg1.concat(gcPath(s.lat, s.lng, a.lat, a.lng));
  } else {
    pts = gcPath(d.lat, d.lng, a.lat, a.lng);
  }
  // Normalise longitudes near the current map centre so the drawing is visible
  const c = map.getCenter().lng;
  const mid = pts[Math.floor(pts.length/2)][1];
  let shift = 0;
  while(mid + shift > c + 180) shift -= 360;
  while(mid + shift < c - 180) shift += 360;
  if(shift) pts = pts.map(p => [p[0], p[1] + shift]);
  pts._stopIdx = stopIdx;
  return pts;
}
function openReplay(){
  const flights = visibleFlights()
    .filter(f => f.date && A[f.depI] && A[f.arrI])
    .sort((a,b) => ((a.date||'')+(a.depT||'')).localeCompare((b.date||'')+(b.depT||'')));
  if(!flights.length) return toast('当前筛选下没有可回放的航班','err');
  if(RP) closeReplay(true);
  RP = {
    flights, idx:0, t:0, playing:true, speed:2, lastTs:null, raf:null, done:false,
    trail: L.layerGroup().addTo(map),
    live: null, head: null, pts: null,
    kms:0, apSeen:new Set(), ctrySeen:new Set(),
  };
  map.removeLayer(routeLayer); map.removeLayer(airportLayer);
  $('replayBar').classList.add('on');
  renderReplayBar();
  map.setView([32, 100], Math.max(map.getZoom(), 3), {animate:true});
  setTimeout(() => { if(RP){ rpBeginFlight(); RP.raf = requestAnimationFrame(rpFrame); } }, 500);
}
function renderReplayBar(){
  $('replayBar').innerHTML = `
    <div class="rp-row">
      <button class="rp-btn" id="rpPlay" onclick="rpTogglePlay()">${RP && RP.playing ? '❚❚' : '▶'}</button>
      <button class="rp-btn small" id="rpSpeed" onclick="rpCycleSpeed()">${RP ? RP.speed : 2}×</button>
      <div class="rp-date" id="rpDate">—</div>
      <div class="rp-flight" id="rpFlight"></div>
      <button class="rp-btn small rp-close" onclick="closeReplay()">✕</button>
    </div>
    <div class="rp-track" id="rpTrack" onclick="rpSeekClick(event)">
      <div class="rp-track-line"></div>
      <div class="rp-track-fill" id="rpFill" style="width:0%"></div>
    </div>
    <div class="rp-stats" id="rpStats"></div>`;
}
function rpBeginFlight(){
  const f = RP.flights[RP.idx];
  RP.pts = rpPathFor(f);
  const col = yearCol(yearOf(f) || minYear);
  RP.live = L.polyline([RP.pts[0]], {color:col, weight:2.6, opacity:0.95}).addTo(RP.trail);
  RP.head = L.circleMarker(RP.pts[0], {radius:4, color:'#fff', weight:1.5, fillColor:col, fillOpacity:1}).addTo(RP.trail);
  rpDropAirport(f.depI, RP.pts[0], col);
  // Gentle camera follow: pan if the route mid-point drifted out of view
  const mid = RP.pts[Math.floor(RP.pts.length/2)];
  if(!map.getBounds().pad(-0.18).contains(mid)) map.panTo(mid, {animate:true, duration:0.6});
}
function rpDropAirport(icao, latlng, col){
  if(RP.apSeen.has(icao)) return;
  RP.apSeen.add(icao);
  const a = A[icao];
  if(a && a.ctry) RP.ctrySeen.add(a.ctry);
  L.circleMarker(latlng, {radius:3.2, color:'rgba(240,244,255,0.85)', weight:1, fillColor:col, fillOpacity:0.9})
    .bindTooltip((a ? a.nameCn.replace(/(国际)?机场$/,'') : icao), {direction:'top', className:'rp-tip', opacity:0.9})
    .addTo(RP.trail);
}
function rpFinishFlight(f){
  RP.live.setLatLngs(RP.pts);
  RP.live.setStyle({weight:1.6, opacity:0.42});
  const col = yearCol(yearOf(f) || minYear);
  rpDropAirport(f.arrI, RP.pts[RP.pts.length-1], col);
  if(f.stopI && A[f.stopI] && RP.pts._stopIdx > 0) rpDropAirport(f.stopI, RP.pts[RP.pts._stopIdx], col);
  if(RP.head){ RP.trail.removeLayer(RP.head); RP.head = null; }
  RP.kms += f.km || 0;
}
function rpFrame(ts){
  if(!RP || !RP.playing) return;
  if(RP.lastTs == null) RP.lastTs = ts;
  const dt = Math.min(80, ts - RP.lastTs);
  RP.lastTs = ts;
  const f = RP.flights[RP.idx];
  RP.t += dt / rpDur(f);
  if(RP.t >= 1){
    rpFinishFlight(f);
    RP.idx++; RP.t = 0;
    if(RP.idx >= RP.flights.length){ rpComplete(); return; }
    rpBeginFlight();
  } else {
    const n = Math.max(2, Math.ceil(RP.t * RP.pts.length));
    const partial = RP.pts.slice(0, n);
    RP.live.setLatLngs(partial);
    if(RP.head) RP.head.setLatLng(partial[partial.length-1]);
  }
  rpHud();
  RP.raf = requestAnimationFrame(rpFrame);
}
function rpHud(){
  const f = RP.flights[Math.min(RP.idx, RP.flights.length-1)];
  $('rpDate').textContent = f.date || '—';
  $('rpFlight').innerHTML = `<b>${f.no||''}</b> ${f.dep} → ${f.arr}${f.ac ? ' · ' + f.ac : ''}`;
  $('rpFill').style.width = ((RP.idx + RP.t) / RP.flights.length * 100).toFixed(2) + '%';
  $('rpStats').innerHTML =
    `<span>第 <b>${Math.min(RP.idx+1, RP.flights.length)}</b> / ${RP.flights.length} 班</span>` +
    `<span><b>${fmt(Math.round(RP.kms))}</b> km</span>` +
    `<span><b>${RP.apSeen.size}</b> 机场</span>` +
    `<span><b>${RP.ctrySeen.size}</b> 国家/地区</span>`;
}
function rpTogglePlay(){
  if(!RP) return;
  if(RP.done){ rpSeek(0); RP.done = false; }
  RP.playing = !RP.playing;
  $('rpPlay').textContent = RP.playing ? '❚❚' : '▶';
  if(RP.playing){ RP.lastTs = null; RP.raf = requestAnimationFrame(rpFrame); }
  else if(RP.raf) cancelAnimationFrame(RP.raf);
}
function rpCycleSpeed(){
  if(!RP) return;
  const seq = [1,2,4,8];
  RP.speed = seq[(seq.indexOf(RP.speed)+1) % seq.length];
  $('rpSpeed').textContent = RP.speed + '×';
}
function rpSeekClick(ev){
  if(!RP) return;
  const r = $('rpTrack').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (ev.clientX - r.left) / r.width));
  rpSeek(Math.floor(pct * RP.flights.length));
}
function rpSeek(idx){
  if(!RP) return;
  if(RP.raf) cancelAnimationFrame(RP.raf);
  RP.trail.clearLayers();
  RP.live = RP.head = null;
  RP.kms = 0; RP.apSeen = new Set(); RP.ctrySeen = new Set();
  RP.idx = Math.max(0, Math.min(idx, RP.flights.length-1)); RP.t = 0; RP.lastTs = null; RP.done = false;
  // Instantly rebuild everything before idx
  for(let i = 0; i < RP.idx; i++){
    const f = RP.flights[i];
    const pts = rpPathFor(f);
    const col = yearCol(yearOf(f) || minYear);
    L.polyline(pts, {color:col, weight:1.6, opacity:0.42}).addTo(RP.trail);
    rpDropAirport(f.depI, pts[0], col);
    rpDropAirport(f.arrI, pts[pts.length-1], col);
    RP.kms += f.km || 0;
  }
  rpBeginFlight();
  rpHud();
  if(RP.playing) RP.raf = requestAnimationFrame(rpFrame);
}
function rpComplete(){
  RP.playing = false; RP.done = true;
  $('rpPlay').textContent = '↻';
  $('rpDate').textContent = '旅程完成';
  $('rpFlight').innerHTML = `🎉 <b>${RP.flights.length}</b> 班 · <b>${fmt(Math.round(RP.kms))}</b> km · ${RP.apSeen.size} 座机场 · ${RP.ctrySeen.size} 个国家/地区`;
  $('rpFill').style.width = '100%';
}
function closeReplay(silent){
  if(!RP) return;
  if(RP.raf) cancelAnimationFrame(RP.raf);
  map.removeLayer(RP.trail);
  RP = null;
  $('replayBar').classList.remove('on');
  if(!map.hasLayer(airportLayer)) airportLayer.addTo(map);
  if(!map.hasLayer(routeLayer)) routeLayer.addTo(map);
  if(!silent) toast('已退出时光机');
}
window.openReplay = openReplay; window.closeReplay = closeReplay;
window.rpTogglePlay = rpTogglePlay; window.rpCycleSpeed = rpCycleSpeed; window.rpSeekClick = rpSeekClick;

// Mobile bottom-sheet toggle
const _sideEl = document.querySelector('.side');
$('sideHandle').addEventListener('click', () => _sideEl.classList.toggle('collapsed'));
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => _sideEl.classList.remove('collapsed')));

// PWA service worker (仅线上环境注册,本地预览不缓存)
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Boot
update();
setTimeout(() => $('loader').classList.add('hide'), 600);
setTimeout(() => $('loader').remove(), 1200);

</script>
</body>
